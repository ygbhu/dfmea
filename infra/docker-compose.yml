services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: dfmea-postgres
    environment:
      POSTGRES_DB: dfmea_workspace
      POSTGRES_USER: dfmea
      POSTGRES_PASSWORD: dfmea_dev
    ports:
      - "5432:5432"
    volumes:
      - dfmea-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dfmea -d dfmea_workspace"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dfmea-postgres-data:

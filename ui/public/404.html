<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      // SPA redirect: GitHub Pages doesn't support client-side routing natively.
      // This redirects all 404s back to index.html with the path preserved.
      var pathSegmentsToKeep = 1 // '/OpenCodeUI' = 1 segment
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
</html>
